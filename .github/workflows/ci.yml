name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Pinned alongside .github/workflows/release.yml. Bumping requires
# both the gala CLI release tag and the gala_simple tag we clone for
# the local_path_override path to exist.
env:
  GALA_VERSION: "0.41.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gala_team
        uses: actions/checkout@v4
        with:
          path: gala_team

      - name: Checkout gala_simple (sibling for local_path_override)
        uses: actions/checkout@v4
        with:
          repository: martianoff/gala
          ref: ${{ env.GALA_VERSION }}
          path: gala_simple

      - name: Checkout gala_tui (sibling for local_path_override)
        uses: actions/checkout@v4
        with:
          repository: martianoff/gala-tui
          path: gala_tui

      - name: Setup Go
        # The gala transpiler invokes `go/importer` for cross-language
        # type inference (so `Option[string].Map(strings.TrimSpace)`
        # resolves to `Option[string]` instead of `Option[any]`). Without
        # Go on PATH the .bazelrc's `--action_env=GOROOT/PATH` exports
        # nothing and the generated .gen.go widens lambdas to `any`,
        # breaking downstream Go compilation.
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Export GOROOT
        # setup-go doesn't always set GOROOT in the env; .bazelrc reads
        # it via --action_env=GOROOT, so make it explicit.
        shell: bash
        run: echo "GOROOT=$(go env GOROOT)" >> "$GITHUB_ENV"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Test
        working-directory: gala_team
        # `bazel test` builds whatever its deps need, including //app/...
        # and the test binaries — the previous separate `bazel build`
        # step was redundant. --jobs=1 + the JVM heap cap keep the 16-GB
        # Linux runner from OOMing the bazel server (prior runs hit
        # 'Server terminated abruptly: Socket closed' around the 25-min
        # mark). local_path_override paths in MODULE.bazel point at
        # dev-only paths; the --override_module flags repoint them at
        # the sibling clones we just checked out.
        run: |
          bazel \
            --host_jvm_args=-Xmx2g \
            test //app/... //cmd:gala_team \
            --jobs=1 \
            --build_tests_only=false \
            --local_resources=memory=10000 \
            --override_module=gala=../gala_simple \
            --override_module=gala_tui=../gala_tui
