name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Bump GALA_VERSION whenever a new gala release ships. gala_team typically
# tracks the latest release; when CI is red after a workaround removal,
# the gating release is in flight.
env:
  GALA_VERSION: "0.39.2"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install GALA CLI
        run: |
          curl -fsSL -o /usr/local/bin/gala \
            "https://github.com/martianoff/gala/releases/download/${GALA_VERSION}/gala-linux-amd64"
          chmod +x /usr/local/bin/gala
          gala version

      - name: Test
        run: gala test
