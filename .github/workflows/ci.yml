name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GALA_VERSION: "0.41.0"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Install gala CLI
        # gala.mod resolves gala_tui + uuid via the GALA dep system —
        # no bazel, no overrides, no siblings. Just install the
        # published gala binary and let `gala test` do its thing.
        run: |
          curl -fsSL -o /tmp/gala "https://github.com/martianoff/gala/releases/download/${GALA_VERSION}/gala-linux-amd64"
          chmod +x /tmp/gala
          sudo mv /tmp/gala /usr/local/bin/gala
          gala version

      - name: Build
        # `gala test` doesn't handle multi-package projects (test files
        # declare `package main` while libs declare their own package
        # name — same convention gala_simple uses, which is why
        # gala_simple's own CI uses bazel for tests). For now we
        # smoke-test that the binary builds; per-package test
        # iteration is a follow-up.
        run: gala build -o gala_team ./cmd

