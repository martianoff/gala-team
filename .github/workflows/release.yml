name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  # Pinned alongside .github/workflows/ci.yml. Bumping requires both
  # the gala CLI release tag and the gala_simple tag we clone for
  # the local_path_override path to exist.
  GALA_VERSION: "0.41.0"

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            platform: "@rules_go//go/toolchain:linux_amd64"
            ext: ""
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            platform: "@rules_go//go/toolchain:linux_arm64"
            ext: ""
          - os: darwin
            arch: amd64
            runner: macos-latest
            platform: "@rules_go//go/toolchain:darwin_amd64"
            ext: ""
          - os: darwin
            arch: arm64
            runner: macos-latest
            platform: "@rules_go//go/toolchain:darwin_arm64"
            ext: ""
          - os: windows
            arch: amd64
            runner: windows-latest
            platform: "@rules_go//go/toolchain:windows_amd64"
            ext: ".exe"

    steps:
      - name: Checkout gala_team
        uses: actions/checkout@v4
        with:
          path: gala_team
          fetch-depth: 0

      - name: Checkout gala_simple (sibling for local_path_override)
        uses: actions/checkout@v4
        with:
          repository: martianoff/gala
          ref: ${{ env.GALA_VERSION }}
          path: gala_simple

      - name: Checkout gala_tui (sibling for local_path_override)
        uses: actions/checkout@v4
        with:
          repository: martianoff/gala-tui
          path: gala_tui

      - name: Add swap space (Linux only)
        # The 16-GB Linux runner OOM-kills the bazel server during
        # cold builds; backing memory with swap lets the gala
        # transpiler + Go compile actions spill instead of dying.
        # macOS / Windows runners aren't hitting this so skip there.
        if: matrix.os == 'linux'
        uses: pierotofy/set-swap-space@49819abfb41bd9b44fb781159c033dba90353a7c
        with:
          swap-size-gb: 10

      - name: Setup Go
        # The gala transpiler invokes go/importer for cross-language
        # type inference; without Go on PATH the .bazelrc's
        # --action_env=GOROOT/PATH exports nothing and lambdas widen
        # to `any`, breaking the generated Go on the Linux runners.
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Export GOROOT
        # setup-go doesn't always set GOROOT in the env; .bazelrc reads
        # it via --action_env=GOROOT, so make it explicit. bash works on
        # all three runners (Git Bash on windows-latest).
        shell: bash
        run: echo "GOROOT=$(go env GOROOT)" >> "$GITHUB_ENV"

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.arch }}
          repository-cache: true

      - name: Stamp version (Unix)
        if: matrix.os != 'windows'
        working-directory: gala_team
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Rewrite the literal in app/version/version.gala so the
          # binary's header reads "Gala Team v<release tag>" instead
          # of the dev placeholder "0.0.1". sed -i differs between
          # GNU and BSD; the empty-string -i argument is the
          # portable form.
          python3 -c "
          import pathlib, re, os
          p = pathlib.Path('app/version/version.gala')
          tag = os.environ.get('RELEASE_TAG', 'dev').lstrip('v')
          p.write_text(re.sub(r'Version\\(\\) string = \"[^\"]+\"',
                              f'Version() string = \"{tag}\"',
                              p.read_text()))
          "

      - name: Stamp version (Windows)
        if: matrix.os == 'windows'
        working-directory: gala_team
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          $tag = $env:RELEASE_TAG -replace '^v',''
          if (-not $tag) { $tag = 'dev' }
          $path = 'app/version/version.gala'
          (Get-Content $path) -replace 'Version\(\) string = "[^"]+"', "Version() string = `"$tag`"" | Set-Content $path

      - name: Build binary
        working-directory: gala_team
        shell: bash
        # --jobs=1 + the JVM heap cap keep the 16-GB Linux runner from
        # OOMing the bazel server. macOS / Windows runners have similar
        # memory budgets, so apply across the matrix.
        run: |
          bazel \
            --host_jvm_args=-Xmx2g \
            build //cmd:gala_team \
            --jobs=2 \
            --platforms=${{ matrix.platform }} \
            --override_module=gala=../gala_simple \
            --override_module=gala_tui=../gala_tui

      - name: Prepare binary (Unix)
        if: matrix.os != 'windows'
        working-directory: gala_team
        run: |
          mkdir -p dist
          cp bazel-bin/cmd/gala_team_/gala_team dist/gala_team-${{ matrix.os }}-${{ matrix.arch }}
          chmod +x dist/gala_team-${{ matrix.os }}-${{ matrix.arch }}

      - name: Prepare binary (Windows)
        if: matrix.os == 'windows'
        working-directory: gala_team
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item bazel-bin/cmd/gala_team_/gala_team.exe dist/gala_team-${{ matrix.os }}-${{ matrix.arch }}.exe

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gala_team-${{ matrix.os }}-${{ matrix.arch }}
          path: gala_team/dist/gala_team-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  upload-release:
    name: Upload Release Assets
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + checksum
        run: |
          cd artifacts
          mkdir -p release
          find . -mindepth 2 -type f -name 'gala_team-*' -exec mv {} release/ \;
          rm -rf gala_team-*/
          mv release/* .
          rmdir release
          sha256sum gala_team-* > checksums-sha256.txt

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/gala_team-*
            artifacts/checksums-sha256.txt
