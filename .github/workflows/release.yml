name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  GALA_VERSION: "0.43.0"

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            ext: ""
            gala_asset: gala-linux-amd64
          - os: darwin
            arch: arm64
            runner: macos-latest
            ext: ""
            gala_asset: gala-darwin-arm64
          - os: windows
            arch: amd64
            runner: windows-latest
            ext: ".exe"
            gala_asset: gala-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add swap space (Linux only)
        # `gala build` exceeds the 16-GB Linux runner during the final
        # `go build`; swap lets it spill instead of OOM-kill. macOS /
        # Windows runners have different memory profiles and don't
        # support this action, so skip there.
        if: matrix.os == 'linux'
        uses: pierotofy/set-swap-space@49819abfb41bd9b44fb781159c033dba90353a7c
        with:
          swap-size-gb: 10

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Install gala CLI (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          curl -fsSL -o /tmp/gala "https://github.com/martianoff/gala/releases/download/${GALA_VERSION}/${{ matrix.gala_asset }}"
          chmod +x /tmp/gala
          sudo mv /tmp/gala /usr/local/bin/gala
          gala version

      - name: Install gala CLI (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $url = "https://github.com/martianoff/gala/releases/download/$env:GALA_VERSION/${{ matrix.gala_asset }}"
          $dst = "$env:USERPROFILE\gala.exe"
          Invoke-WebRequest -Uri $url -OutFile $dst
          echo "$env:USERPROFILE" >> $env:GITHUB_PATH
          & $dst version

      - name: Stamp version (Unix)
        if: matrix.os != 'windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python3 -c "
          import pathlib, re, os
          p = pathlib.Path('app/version/version.gala')
          tag = os.environ.get('RELEASE_TAG', 'dev').lstrip('v')
          p.write_text(re.sub(r'Version\\(\\) string = \"[^\"]+\"',
                              f'Version() string = \"{tag}\"',
                              p.read_text()))
          "

      - name: Stamp version (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          $tag = $env:RELEASE_TAG -replace '^v',''
          if (-not $tag) { $tag = 'dev' }
          $path = 'app/version/version.gala'
          (Get-Content $path) -replace 'Version\(\) string = "[^"]+"', "Version() string = `"$tag`"" | Set-Content $path

      - name: Build binary (Unix)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          mkdir -p dist
          gala build -o dist/gala_team-${{ matrix.os }}-${{ matrix.arch }} ./cmd
          chmod +x dist/gala_team-${{ matrix.os }}-${{ matrix.arch }}

      - name: Build binary (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          gala build -o "dist/gala_team-${{ matrix.os }}-${{ matrix.arch }}.exe" ./cmd

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: gala_team-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/gala_team-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}

  upload-release:
    name: Upload Release Assets
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + checksum
        run: |
          cd artifacts
          mkdir -p release
          find . -mindepth 2 -type f -name 'gala_team-*' -exec mv {} release/ \;
          rm -rf gala_team-*/
          mv release/* .
          rmdir release
          sha256sum gala_team-* > checksums-sha256.txt

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/gala_team-*
            artifacts/checksums-sha256.txt
