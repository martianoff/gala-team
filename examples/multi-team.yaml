# Multi-team example — two teams in one yaml. The lead of `main`
# can `@consult(transpiler) … @end` to delegate compiler-flavoured
# questions to the second team without leaving the project.
#
# `gala_team --team examples/multi-team.yaml --project .`
# `gala_team --team examples/multi-team.yaml --project . --team-key transpiler`
#                                                       ^^^ start with the second team as the main one

teams:
  # ─────────────────────────────────────────────────────────────────
  # Default main team — what the user talks to without --team-key.
  # ─────────────────────────────────────────────────────────────────
  - key: main
    name: "Skunkworks"
    description: "Backend microservices team"
    onboarding:
      - docs/CONTRIBUTING.md
      - docs/ARCHITECTURE.md
    members:
      - role: team_lead
        name: "Iris"
        personality: "Calm, decisive. Delegates aggressively, summaries crisply."
        extra_instructions: |
          When the user's ask sounds like compiler / language work,
          delegate to the transpiler team via @consult(transpiler) …
      - role: engineer
        name: "Felix"
        personality: "Terse, functional-leaning."
        extra_instructions: |
          Prefer pattern matching over if-else chains.
      - role: qa
        name: "Theo"
        personality: "Evidence-driven. Reproduces before opining."

  # ─────────────────────────────────────────────────────────────────
  # Sibling team. Addressable as @consult(transpiler) from `main`'s
  # lead. Same project, same workspace, just a different lead +
  # different specialists. Spawned in-process — no extra registry
  # entry needed.
  # ─────────────────────────────────────────────────────────────────
  - key: transpiler
    name: "Transpiler Wizards"
    description: "Compiler / language work — types, lowering, codegen"
    onboarding:
      - docs/TRANSPILER_INTERNALS.md
    members:
      - role: team_lead
        name: "Theodora"
        personality: "Precise. Cites the language spec by section number."
      - role: engineer
        name: "Cade"
        personality: "Pragmatic. Reaches for working code over clever code."
      - role: qa
        name: "Robin"
        personality: "Reads generated Go before approving."

# Shared workflow + policy across both teams.
workflow:
  qa_required: true
  parallel_engineers: true
  approval:
    require_user_confirm: true

policy:
  workspace_mode: worktree-per-engineer    # engineers each get their own git worktree
  merge_rule: squash
  pre_merge:
    - name: lint
      cmd: go
      args: [vet, ./...]
    - name: test
      cmd: go
      args: [test, ./...]
